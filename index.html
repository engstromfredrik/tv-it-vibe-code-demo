<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>What's for Dinner?</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>🍽️ What's for Dinner?</h1>
    <p>30 delicious ideas — pick one or let us decide!</p>
  </header>

  <div class="surprise-bar">
    <button id="surprise-btn">🎲 Surprise Me!</button>
  </div>

  <div class="filters">
    <div class="filter-row">
      <span class="filter-label">Category</span>
      <div id="category-filters"></div>
    </div>
    <div class="filter-row">
      <span class="filter-label">Effort</span>
      <div id="effort-filters"></div>
    </div>
    <div class="fav-row">
      <label>
        <input type="checkbox" id="fav-toggle">
        Show favorites only ♥
      </label>
    </div>
  </div>

  <div class="result-bar">
    <span id="result-count"></span>
  </div>

  <main id="dinner-grid" class="dinner-grid"></main>

  <div id="modal" class="modal hidden">
    <div id="modal-content" class="modal-box"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
